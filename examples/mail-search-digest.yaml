# Mail search & summarise workflow
#
# Searches your inbox for recent unread emails, then asks Copilot to
# produce a short digest. Tests the normalised mail.search output
# (id, from, to, subject, date, isRead, hasAttachments, preview).
#
# Prerequisites:
#   - Agency CLI with mail MCP (`agency mcp mail`)
#   - Authenticated via agency / Entra ID
#
# Usage:
#   lobster-copilot examples/mail-search-digest.yaml
#   lobster-copilot examples/mail-search-digest.yaml --dry-run
#
# Tip: Tweak --top / --folder / --query to change what's fetched.

name: mail-search-digest

steps:
  # 1. Fetch unread inbox emails (normalised JSON objects)
  - id: fetch
    pipeline: >
      mail.search --folder inbox --top 5 --order-by newest
      | pick from,subject


  # 3. (Optional) Send the digest to yourself on Teams
  #    Uncomment to enable:
  # - id: notify
  #   pipeline: >
  #     teams.send --self
  #   stdin: $digest
