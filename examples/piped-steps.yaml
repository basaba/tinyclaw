# Multi-step pipeline — output of step 1 feeds into step 2
name: piped-steps
steps:
  - id: generate
    pipeline: "llm.invoke --provider copilot --prompt 'Generate a short fictional product description for a smart water bottle.'"

  - id: translate
    stdin: "$generate.stdout"
    pipeline: "llm.invoke --provider copilot --prompt 'Translate the following product description to French.'"
