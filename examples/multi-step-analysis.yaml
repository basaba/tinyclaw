name: multi-step-analysis
version: "1.0.0"
description: "Multi-step analysis workflow with memory persistence across steps"
steps:
  - id: fetch-data
    type: web_fetch
    url: "https://api.example.com/metrics"
  - id: summarize-data
    type: tool
    tool: summarize
    config:
      data: "{{steps.fetch-data.result}}"
      format: "bullet_points"
      conversation_id: "analysis-session"
      workflow_id: "multi-step-analysis"
  - id: review-approval
    type: approval
    prompt: "Review the summary before proceeding"
    preview: "{{steps.summarize-data.result}}"
  - id: deep-analysis
    type: tool
    tool: reason
    config:
      prompt: "Based on the summarized metrics, identify the top 3 areas that need immediate attention and suggest action items for each."
      conversation_id: "analysis-session"
      workflow_id: "multi-step-analysis"
  - id: report
    type: exec
    command: "cat > report.md"
    input: $steps.deep-analysis.result
