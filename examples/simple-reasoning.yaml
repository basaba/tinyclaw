name: simple-reasoning
version: "1.0.0"
description: "Simple reasoning workflow using Copilot via lobster-copilot bridge"
steps:
  - id: analyze
    type: tool
    tool: reason
    config:
      prompt: "What are the key considerations for migrating a monolithic application to microservices?"
      workflow_id: "simple-reasoning"
  - id: present
    type: exec
    command: "echo 'Analysis complete'"
    input: $steps.analyze.result
