# Email digest via Agency Copilot
#
# Uses `exec` to call `agency copilot` (the Copilot CLI wrapper)
# instead of the built-in `copilot` command — useful when you need
# Agency-specific model routing, agents, or MCP tool access.
#
# Flow:
#   1. Search unread inbox emails (last 24 hours), pick key fields
#   2. Write email data to a temp file via --stdin-file
#   3. Agency copilot reads the file and summarizes
#   4. Send markdown digest to Teams (self)
#
# Prerequisites:
#   - Agency CLI installed (`agency copilot` available on PATH)
#   - Agency CLI with mail MCP (`agency mcp mail`)
#   - Authenticated via agency / Entra ID
#
# Usage:
#   tinyclaw examples/mail/mail-digest-agency.yaml

name: mail-digest-agency
description: Summarize unread emails using agency copilot

steps:
  - id: digest
    pipeline: >
      mail.search --since 1d --folder inbox --top 20
      | pick from,subject,date,preview
      | exec --stdin-file json agency copilot -sp "Read the file at $LOBSTER_STDIN_FILE containing email metadata and summarise as a concise bullet-point digest grouped by sender."
      | teams.send --self --markdown
