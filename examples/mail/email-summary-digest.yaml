# Email Summary Digest Workflow
#
# Fetches unread emails from your inbox, summarises them with Copilot,
# and sends the digest to yourself on Teams.
#
# Prerequisites:
#   - Agency CLI with mail MCP (`agency mcp mail`)
#   - Authenticated via agency / Entra ID
#   - Teams integration configured
#
# Usage:
#   tinyclaw examples/mail/email-summary-digest.yaml
#   tinyclaw examples/mail/email-summary-digest.yaml --dry-run

name: email-summary-digest
description: Fetch unread emails, summarise with Copilot, send digest via Teams

steps:
  # 1. Fetch unread emails from inbox
  - id: fetch
    pipeline: >
      mail.search --unread --folder inbox --top 2
      | pick from,subject,preview
    retry:
      max: 3
      backoff: exponential
      delay_ms: 1000

  # 2. Summarise with Copilot
  - id: summary
    pipeline: >
      copilot --prompt 'Summarise these emails as a concise bullet-point digest. Group by sender. Highlight anything that looks urgent or time-sensitive.'
    stdin: $fetch

  # 3. Send digest to yourself on Teams
  - id: notify
    pipeline: >
      teams.send --self
    stdin: $summary.stdout
    on_error: continue
