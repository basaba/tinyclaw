# Mail workflow examples
#
# Prerequisites:
#   - Agency CLI with mail MCP (`agency mcp mail`)
#   - Authenticated via agency/Entra ID
#
# Usage:
#   tinyclaw examples/mail-digest.yaml
#   tinyclaw examples/mail-digest.yaml --dry-run

name: mail-digest

# Summarise unread inbox emails and send the digest to yourself
steps:
  # 1. Fetch unread emails from inbox
  - id: unread
    pipeline: >
      mail.search --unread --folder inbox --top 1
    retry:
      max: 3
      backoff: exponential
      delay_ms: 1000

