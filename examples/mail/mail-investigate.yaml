# Email investigation workflow
#
# Monitors your inbox for emails containing the @@@investigate mnemonic
# OR with [ErrorsDetectionAutomation][NullReferenceErrors] in the subject.
# When found, reads the email body, sends it to Agency Copilot for
# investigation, and replies with the results.
#
# Deduplication:
#   1. Within a batch: sort by receivedDateTime desc, then dedupe by conversationId
#      so only the latest email per thread is processed.
#   2. Across runs: diff.key with conversationId ensures each conversation thread
#      is only investigated once, even if it reappears in future fetches.
#
# Flow:
#   1. Search inbox for emails from sender
#   2. Client-side filter for @@@investigate in preview OR error detection in subject
#   3. diff.key by conversationId — only process new conversation threads
#   4. For each new thread: read full body → copilot investigates → reply
#
# State:
#   Stores processed conversation IDs in ~/.lobster/state/mail-investigate.json
#
# Prerequisites:
#   - Agency CLI with mail MCP (`agency mcp mail`)
#   - Agency Copilot (`agency copilot`)
#   - Authenticated via agency / Entra ID
#
# Usage:
#   tinyclaw examples/mail/mail-investigate.yaml
#   Schedule: every 5 min in the TUI

name: mail-investigate
description: Investigate issues from @@@investigate emails or NullReferenceErrors alerts

args:
  cwd:
    description: "Working directory for the workflow"
    default: "${env:KUSTO_REPO_PATH}"
  sender:
    description: "Sender email address to filter on"

cwd: "${cwd}"

steps:

  # 1. Fetch recent emails, filter for triggers, deduplicate
  #    sort newest-first then dedupe by conversationId so only the latest
  #    email per thread is kept before cross-run diff
  - id: new-threads
    pipeline: >
      mail.search --folder inbox --top 50 --order-by newest
      | compute _isNullRef='contains(subject, "[ErrorsDetectionAutomation][NullReferenceErrors]")'
      | compute _mailHasKeyword='contains(preview, "@@@investigate") && contains(from.emailAddress.address, "${sender}")'
      | where _isNullRef==true || _mailHasKeyword==true
      | sort --key receivedDateTime --desc
      | dedupe --key conversationId
      | diff.key --key mail-investigate --field conversationId
      | where changed==true

  # 2. For each new thread: read body, investigate, reply
  - id: investigate
    for_each: $new-threads.json
    steps:
      # Read full body and investigate with copilot
      - id: analysis
        pipeline: >
          mail.read --id $item.json.id
          | agency.copilot "Investigate the issue described below.
          Provide a clear, structured analysis with:
          1. Problem summary
          2. Likely root cause(s)
          3. Recommended next steps or resolution
          4. Any relevant context or references

          Be thorough but concise. Format your response clearly." --mcp 'kusto --service-uri https://kuskusprod.kusto.windows.net'
          | mail.reply --id $item.json.id --reply-all --markdown