# Forward PR status report via email
#
# Monitors ADO pull requests, generates a summary with Copilot,
# and emails it to the team.
#
# Usage:
#   lobster-copilot examples/pr-email-report.yaml \
#     --args-json '{"org":"myorg","project":"myproject","to":"team@example.com"}'

name: pr-email-report

args:
  org:
    description: Azure DevOps organization
    required: true
  project:
    description: Azure DevOps project
    required: true
  to:
    description: Email recipients (comma-separated)
    required: true

steps:
  # 1. Fetch open PRs
  - id: prs
    pipeline: >
      ado.pr.monitor --org $args.org --project $args.project

  # 2. Generate an HTML summary
  - id: report
    pipeline: >
      copilot --prompt 'Create a concise HTML email summarising these pull requests.
        Use <b> for PR titles, group by status (active/draft/completed).
        Include reviewer vote status. Keep it brief.'
    stdin: $prs

  # 3. Email the report
  - id: send
    pipeline: >
      mail.send --to '$args.to' --subject 'PR Status Report — $args.project' --content-type HTML
    stdin: $report
