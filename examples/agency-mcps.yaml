# Example: Use MCP servers configured in mcp.json
#
# 1. Create a mcp.json in your project root (see examples/mcp.json)
# 2. Run with all configured MCPs:
#      lobster-copilot run examples/agency-mcps.yaml
# 3. Or filter to specific servers:
#      lobster-copilot run examples/agency-mcps.yaml --mcps msft-learn
# 4. Or point to a specific config:
#      lobster-copilot run examples/agency-mcps.yaml --mcp-config examples/mcp.json --mcps msft-learn

id: mcp-demo
steps:
  - id: learn
    pipeline: llm.invoke --prompt "Using the MCP tools available to you, find documentation about Azure Container Apps. Summarize the key concepts in 3 bullet points."
