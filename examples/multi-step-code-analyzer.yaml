name: multi-step-code-analyzer
description: |
  Multi-step workflow that demonstrates chaining Copilot LLM calls.
  1. Generates a code snippet
  2. Reviews it for bugs
  3. Produces a structured improvement plan

steps:
  # Step 1: Generate a code snippet
  - id: generate
    pipeline: |
      llm.invoke --prompt 'Write a short TypeScript function (20 lines max) that parses a CSV string into an array of objects. Include at least 2 subtle bugs on purpose.'

  # Step 2: Review the generated code for bugs
  - id: review
    pipeline: |
      llm.invoke --prompt 'Review this code for bugs and issues. List each bug with its line and explanation.'
    stdin: "$generate.stdout"

  # Step 3: Produce a structured improvement plan as JSON
  - id: plan
    pipeline: |
      llm.invoke --prompt 'Based on this code review, create an improvement plan.'
    stdin: "$review.stdout"
