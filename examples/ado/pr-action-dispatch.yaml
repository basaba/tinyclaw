# PR action dispatch
#
# Walks the caller's active PRs in Azure-Kusto-Service and applies the
# following actions:
#
#   1. List all my active PRs and compute their status (approval +
#      required-build state) via examples/ado/scripts/Get-PrActions.ps1.
#      The script mirrors the logic of the pr-status-report skill.
#   2. For each PR that is *fully approved* but only missing
#      "Proof Of Presence" → email me so I can re-attest.
#   3. For each PR still waiting on reviewers → include the PR + the
#      reviewer names in a single digest email to me.
#   4. For each "Linux" or "devCM" build policy that is Expired →
#      re-queue the policy evaluation via the ADO REST API.
#
# An approval gate sits between data collection and side effects so the
# user can review the digest before any mail is sent or any policy is
# re-queued.
#
# Prerequisites:
#   - Azure CLI authenticated (`az login`) with access to msazure/One.
#   - Azure CLI azure-devops extension (`az extension add --name azure-devops`).
#   - mail MCP available (`agency mcp mail`) and authenticated.
#   - PowerShell 5.1+ or pwsh 7+.
#
# Usage:
#   tinyclaw examples/ado/pr-action-dispatch.yaml \
#     --args-json '{"mailTo":"alias@microsoft.com"}'
#
#   tinyclaw examples/ado/pr-action-dispatch.yaml --dry-run
#
# Schedule:
#   tinyclaw sched add \
#     --name pr-action-dispatch \
#     --file examples/ado/pr-action-dispatch.yaml \
#     --schedule "every 1h" \
#     --args '{"mailTo":"alias@microsoft.com"}'

name: pr-action-dispatch
description: Triage my active ADO PRs — email me on PoP / pending reviews and re-queue Expired Linux/devCM builds

args:
  org:
    description: "Azure DevOps organization URL"
    default: "https://dev.azure.com/msazure"
  project:
    description: "Project name"
    default: "One"
  repository:
    description: "Repository name"
    default: "Azure-Kusto-Service"
  mailTo:
    description: "Email recipient for the digest (your address)"
    default: "${env:USER_EMAIL}"

steps:
  # 1. Collect every active PR's action plan via the helper script.
  #    The script outputs { actions, requeues, hasActions, digest } as JSON.
  - id: plan
    run: >
      pwsh -NoProfile -File examples/ado/scripts/Get-PrActions.ps1
      -Org "${org}" -Project "${project}" -Repository "${repository}"

  # 2. Short-circuit when there is nothing to do — keeps scheduled runs quiet.
  - id: stop-if-idle
    when: $plan.json.hasActions == false
    pipeline: break --message "No PRs need action right now."

  # 3. Approval gate — show the digest and wait for a click before any
  #    side effects (email, re-queue) happen.
  - id: review
    run: echo $plan.json.digest
    approval: "Review the PR action plan above. Approve to send the digest email and re-queue any Expired Linux/devCM builds."

  # 4. Email digest to the user (single mail, lists every PR + who I'm
  #    waiting on, plus PRs that only need PoP, plus PRs whose builds
  #    will be re-queued).
  - id: mail-digest
    when: $review.approved == true
    pipeline: >
      mail.send
      --to "${mailTo}"
      --subject "PR action digest — ${repository}"
      --markdown
    stdin: $plan.json.digest

  # 5. Re-queue every Expired Linux/devCM build policy.
  #    PATCH on the policy evaluation URL re-runs the policy.
  - id: requeue
    when: $review.approved == true
    for_each: $plan.json.requeues
    steps:
      - id: log-requeue
        run: >
          echo "[requeue] PR #$item.json.PrId — $item.json.Name (eval $item.json.EvaluationId)"

      - id: patch
        run: >
          az rest --method patch
          --url "${org}/${project}/_apis/policy/evaluations/$item.json.EvaluationId"
          --url-parameters api-version=7.0-preview.1
          --resource 499b84ac-1321-427f-aa17-267ca6975798
