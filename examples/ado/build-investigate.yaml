# Investigate Azure DevOps build test failures with Copilot
#
# Fetches the latest failed build for a pipeline, retrieves test failure
# details, and asks Copilot to investigate root causes.
#
# Prerequisites:
#   - Azure CLI with azure-devops extension (`az extension add --name azure-devops`)
#   - Authenticated via `az login`
#
# Usage:
#   npx tsx examples/run-workflow.ts

name: ado-build-investigate

cwd: "${workdir}"

args:
  workdir:
    description: "Working directory for the Copilot investigation step"
    default: "${config:KUSTO_REPO_PATH}"
  to:
    description: "Email recipient for investigation results"
    default: "ilayr_org_fte@microsoft.com"
  build_id:
    description: "Build id of devCM"
    default: "${config:ADO_DEVCM_BUILD_DEF_ID}"
  ado_resource_id:
    description: "AAD resource id of ado app"
    default: "${config:ADO_RESOURCE_ID}"

steps:
  # 1. Get the latest failed build for the pipeline
  - id: latest-build
    run: >
      az pipelines build list
      --definition-ids ${build_id}
      --top 1
      --result failed
      --status completed
      --output json

  # 2. Check if this build was already investigated — skip if so
  - id: check-new
    pipeline: "diff.key.exists --key ado-build-investigate:${build_id} --field id"
    stdin: $latest-build.json

  - id: guard-seen
    pipeline: "where changed==true | gate --when empty"
    stdin: $check-new.json

  # 3. Fetch test runs associated with the build
  #    Note: api-version is passed via --url-parameters to avoid & in the URL
  #    which cmd.exe interprets as a command separator on Windows.
  - id: test-runs
    run: >
      az rest --method get
      --url https://dev.azure.com/msazure/One/_apis/test/runs?buildUri=vstfs:///Build/Build/$latest-build.json.0.id
      --url-parameters api-version=7.1
      --resource ${ado_resource_id}
      --output json

  # 4.  For each test run with failures, fetch and trim failed test results
  - id: failures
    for_each: $test-runs.json.value
    steps:
      - id: failed-tests
        condition: $item.json.totalTests>$item.json.passedTests
        run: >
          az rest --method get
          --url https://dev.azure.com/msazure/One/_apis/test/runs/$item.json.id/results?outcomes=Failed
          --url-parameters api-version=7.1
          --resource ${ado_resource_id}
          --output json

    
  # 5. Ensure the repo is up to date before Copilot investigates
  - id: git-pull
    run: git pull --prune

  # 6. Reload skills
  - id: reload-skills
    run: copilot -p "/skills reload"

  # 7. Run agency copilot to investigate failures in the repo context
  - id: investigate
    pipeline: >
      agency.copilot "/cm-e2e-investigation: Please investigate these failures and suggest root causes and next steps. (Ignore DummyReportCleanupFailure and dont mention it),
      Please provide executive summary first (keep it brief), and then the details after"
    stdin: $failures.json

  # 8. Remove the first paragraph from the investigation output
  - id: trim-output
    pipeline: >
      copilot --prompt "Remove the first paragraph from the following text and return the rest as-is. Do not add any commentary." --model gpt-5-mini
    stdin: $investigate.stdout

  # 9. Send the trimmed investigation results via email
  - id: send-email
    pipeline: >
      mail.send --to ${to} --subject "Build Investigation: $latest-build.json.0.buildNumber" --markdown
    stdin: $trim-output.stdout

  # 10. Mark this build as investigated
  - id: mark-seen
    pipeline: "diff.key.set --key ado-build-investigate:${build_id} --field id"
    stdin: $latest-build.json